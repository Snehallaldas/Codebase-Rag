services:
  - type: web
    name: codebase-rag
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENABLE_INGEST
        value: "true"
      - key: MISTRAL_API_KEY
        value: "YOUR_MISTRAL_API_KEY"
      - key: PINECONE_API_KEY
        value: "YOUR_PINECONE_API_KEY"
      - key: PINECONE_INDEX_NAME
        value: "codebase-rag"
